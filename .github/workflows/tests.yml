name: Run Tests

on:
  push:
    branches:
      - trunk
  pull_request:
    types: [opened, synchronize]

jobs:
  test:
    name: PHP ${{ matrix.php-version }} - WP ${{ matrix.wp-version }} - WC ${{ matrix.wc-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php-version: ['7.4', '8.3']
        wp-version: ['6.4', 'latest']
        wc-version: ['8.7.0', 'latest']
        # Exclude WC 8.7.0 on PHP 8.3 as it's not an officially supported combination and may cause noisy test failures.
        exclude:
          - php-version: '8.3'
            wc-version: '8.7.0'

    services:
      mysql:
        image: mysql:5.7
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test_db
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, xml, ctype, json, dom, zip, mysqli
          coverage: none

      - name: Install svn
        run: sudo apt-get update && sudo apt-get install -y subversion

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Set up WordPress test environment
        run: bash bin/install-wp-tests.sh test_db root root 127.0.0.1 ${{ matrix.wp-version }}
        env:
          DB_NAME: test_db
          DB_USER: root
          DB_PASS: root
          DB_HOST: 127.0.0.1

      - name: Install WooCommerce
        run: |
          if [ "${{ matrix.wc-version }}" == "latest" ]; then
            svn co https://plugins.svn.wordpress.org/woocommerce/trunk/ /tmp/wordpress/wp-content/plugins/woocommerce
          else
            svn co https://plugins.svn.wordpress.org/woocommerce/tags/${{ matrix.wc-version }}/ /tmp/wordpress/wp-content/plugins/woocommerce
          fi

      - name: Run tests
        run: composer test 